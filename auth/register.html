<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - معهد البصائر</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN for preview) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        display: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4',
                            400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e',
                            800: '#115e59', 900: '#134e4a', 950: '#042f2e'
                        },
                        secondary: {
                            50: '#fdf4ff', 100: '#fae8ff', 200: '#f5d0fe', 300: '#f0abfc',
                            400: '#e879f9', 500: '#d946ef', 600: '#c026d3', 700: '#a21caf',
                            800: '#86198f', 900: '#701a75', 950: '#4a044e'
                        },
                        surface: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a', 950: '#020617'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>

<body
    class="font-sans text-surface-800 antialiased bg-white selection:bg-primary-500 selection:text-white lg:h-screen flex overflow-hidden">

    <!-- Left Side: Interactive Graphic / Branding (Visible on lg screens) -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-surface-900 overflow-hidden isolate justify-center items-center">
        <!-- Abstract Background -->
        <div class="absolute inset-0 bg-gradient-to-br from-surface-900 via-primary-950 to-secondary-900 z-0"></div>
        <div class="absolute inset-0 bg-pattern z-0 mix-blend-overlay"></div>

        <!-- Glowing Orbs -->
        <div
            class="absolute top-[20%] left-[-10%] w-[30vw] h-[30vw] bg-primary-500/20 rounded-full blur-3xl z-0 animate-pulse">
        </div>
        <div class="absolute bottom-[10%] right-[10%] w-[25vw] h-[25vw] bg-secondary-500/10 rounded-full blur-3xl z-0">
        </div>

        <!-- Content -->
        <div class="relative z-10 p-12 max-w-2xl text-white">
            <div class="mb-12">
                <div
                    class="flex h-20 w-20 items-center justify-center rounded-2xl bg-gradient-to-br from-primary-400 to-primary-600 font-display text-4xl font-bold text-white shadow-2xl shadow-primary-500/40 ring-1 ring-white/20">
                    B
                </div>
            </div>
            <h1 class="text-4xl lg:text-5xl font-extrabold leading-tight mb-6">
                انضم إلينا في <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-secondary-400">رحلة
                    التعلم</span>
            </h1>
            <p class="text-lg text-surface-300 leading-relaxed font-medium max-w-xl">
                قم بإنشاء حسابك الآن في ثوانٍ معدودة وانطلق نحو تجربة تعليمية سلسة، موثوقة ومدعومة بأحدث أدوات العصر.
            </p>

            <!-- Quick Features -->
            <div class="mt-12 space-y-6">
                <div class="flex items-center gap-4">
                    <div
                        class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-surface-800 border border-surface-700">
                        <svg class="w-5 h-5 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <p class="text-surface-200 font-bold">تسجيل سريع وآمن.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div
                        class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-surface-800 border border-surface-700">
                        <svg class="w-5 h-5 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <p class="text-surface-200 font-bold">إشعارات فورية عبر واتساب.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div
                        class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-surface-800 border border-surface-700">
                        <svg class="w-5 h-5 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <p class="text-surface-200 font-bold">وصول لتقارير دراسية مفصلة.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Side: Form -->
    <div class="flex relative w-full lg:w-1/2 flex-col items-center justify-center p-6 sm:p-12 lg:p-24 overflow-y-auto">
        <!-- Mobile Logo (Hidden on lg) -->
        <div class="lg:hidden flex mb-12 items-center justify-center">
            <div
                class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 font-display text-3xl font-bold text-white shadow-xl shadow-primary-500/30">
                B
            </div>
        </div>

        <div class="w-full max-w-sm shrink-0">
            <!-- Form Header -->
            <div class="mb-10 text-center lg:text-right">
                <h2 class="text-3xl font-extrabold text-surface-900 tracking-tight">إنشاء حساب جديد</h2>
                <p class="mt-2 text-surface-500 font-medium">سجل بياناتك واستمتع بكافة المزايا.</p>
            </div>

            <!-- The Form -->
            <form action="#" method="POST" class="space-y-5">

                <!-- Name Group -->
                <div class="space-y-2">
                    <label for="name" class="block text-sm font-bold text-surface-800">الاسم كاملاً</label>
                    <div class="relative group">
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5">
                            <svg class="h-5 w-5 text-surface-400 group-focus-within:text-primary-500 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                            </svg>
                        </div>
                        <input id="name" name="name" type="text" autocomplete="name" required
                            class="block w-full rounded-xl border border-surface-200 py-3 pr-11 pl-4 text-surface-900 shadow-sm placeholder:text-surface-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 sm:text-sm transition-all outline-none"
                            placeholder="محمد أحمد">
                    </div>
                </div>

                <!-- Email Group -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-bold text-surface-800">البريد الإلكتروني</label>
                    <div class="relative group">
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5">
                            <svg class="h-5 w-5 text-surface-400 group-focus-within:text-primary-500 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                            </svg>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="block w-full rounded-xl border border-surface-200 py-3 pr-11 pl-4 text-surface-900 shadow-sm placeholder:text-surface-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 sm:text-sm transition-all outline-none"
                            placeholder="user@example.com">
                    </div>
                </div>

                <!-- Password Group -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-bold text-surface-800">كلمة المرور</label>
                    <div class="relative group">
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5">
                            <svg class="h-5 w-5 text-surface-400 group-focus-within:text-primary-500 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="new-password" required
                            class="block w-full rounded-xl border border-surface-200 py-3 pr-11 pl-4 text-surface-900 shadow-sm placeholder:text-surface-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 sm:text-sm transition-all outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Confirm Password Group -->
                <div class="space-y-2">
                    <label for="password_confirmation" class="block text-sm font-bold text-surface-800">تأكيد كلمة
                        المرور</label>
                    <div class="relative group">
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3.5">
                            <svg class="h-5 w-5 text-surface-400 group-focus-within:text-primary-500 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <input id="password_confirmation" name="password_confirmation" type="password"
                            autocomplete="new-password" required
                            class="block w-full rounded-xl border border-surface-200 py-3 pr-11 pl-4 text-surface-900 shadow-sm placeholder:text-surface-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 sm:text-sm transition-all outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit"
                        class="group relative flex w-full justify-center items-center gap-2 overflow-hidden rounded-xl bg-surface-900 hover:bg-black px-4 py-4 text-sm font-bold text-white shadow-xl shadow-surface-900/20 transition-all active:scale-[0.98]">
                        <span>تأكيد وإنشاء حساب</span>
                        <svg class="w-5 h-5 rtl:rotate-180 transition-transform group-hover:translate-x-1 rtl:group-hover:-translate-x-1"
                            fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
                        </svg>
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center lg:text-right text-sm text-surface-600 font-medium">
                لديك حساب بالفعل؟
                <a href="login.html" class="font-bold text-primary-600 hover:text-primary-800 transition-colors">تسجيل
                    الدخول</a>
            </div>
        </div>
    </div>
</body>

</html>
